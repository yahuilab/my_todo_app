<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>待办事项</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        background: radial-gradient(1200px circle at 10% 10%, rgba(13, 110, 253, 0.12), transparent 55%),
          radial-gradient(900px circle at 90% 20%, rgba(25, 135, 84, 0.12), transparent 50%),
          #0b1220;
        min-height: 100vh;
      }
      .app-shell {
        max-width: 820px;
      }
      .glass {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.14);
        backdrop-filter: blur(10px);
      }
      .todo-title.done {
        text-decoration: line-through;
        opacity: 0.7;
      }
      .btn-icon {
        width: 2.5rem;
      }
    </style>
  </head>
  <body class="text-light">
    <main class="container py-5">
      <div class="app-shell mx-auto">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <div>
            <h1 class="h3 mb-1">待办事项</h1>
            <div class="text-secondary">添加、完成（划线）、删除</div>
          </div>
          <span class="badge rounded-pill text-bg-dark border border-secondary-subtle">
            共 {{ todos|length }} 项
          </span>
        </div>

        <div class="card glass shadow-sm mb-4">
          <div class="card-body">
            <form class="d-flex gap-2" method="post" action="{{ url_for('add') }}">
              <input
                name="title"
                class="form-control form-control-lg bg-dark text-light border-secondary"
                placeholder="输入一个待办事项，例如：今天跑步 20 分钟"
                autocomplete="off"
                maxlength="200"
                required
              />
              <button class="btn btn-primary btn-lg flex-shrink-0" type="submit">添加</button>
            </form>
          </div>
        </div>

        <div class="card glass shadow-sm">
          <div class="card-body p-0">
            {% if todos %}
            <ul class="list-group list-group-flush">
              {% for t in todos %}
              <li class="list-group-item bg-transparent text-light border-secondary-subtle">
                <div class="d-flex align-items-center gap-2 py-1">
                  <form method="post" action="{{ url_for('toggle', todo_id=t.id) }}" class="m-0">
                    <button
                      type="submit"
                      class="btn {{ 'btn-success' if t.done else 'btn-outline-success' }} btn-icon"
                      aria-label="切换完成状态"
                      title="切换完成状态"
                    >
                      {% if t.done %}✓{% else %}○{% endif %}
                    </button>
                  </form>

                  <div class="flex-grow-1">
                    <div class="todo-title {{ 'done' if t.done else '' }}">{{ t.title }}</div>
                    <div class="small text-secondary">{{ t.created_at }}</div>
                  </div>

                  <form
                    method="post"
                    action="{{ url_for('delete', todo_id=t.id) }}"
                    class="m-0"
                    onsubmit="return confirm('确定删除这条待办吗？');"
                  >
                    <button
                      type="submit"
                      class="btn btn-outline-danger btn-icon"
                      aria-label="删除"
                      title="删除"
                    >
                      ×
                    </button>
                  </form>
                </div>
              </li>
              {% endfor %}
            </ul>
            {% else %}
            <div class="p-4">
              <div class="text-secondary">还没有待办事项。先添加一条吧。</div>
            </div>
            {% endif %}
          </div>
        </div>

        <div class="mt-3 text-secondary small">
          提示：点击左侧圆圈可切换完成状态（划线），右侧 × 可删除。
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
